<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Resilience Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div id="map"></div>

    <button id="show-sidebar-btn" class="sidebar-toggle-fixed hidden">Show Sidebar</button>

    <!-- Integrated Sidebar -->
    <div id="sidebar" class="sidebar active">
        <div class="sidebar-header">
            <div class="header-controls">
                <button id="toggle-sidebar" class="toggle-btn">Hide Sidebar</button>
                <button id="exit-compare-btn" class="toggle-btn danger hidden">Exit Comparison</button>
                <button id="admin-login-btn" class="toggle-btn">Admin Login</button>
                <button id="admin-logout-btn" class="toggle-btn hidden">Logout</button>
            </div>
        </div>

        <div class="sidebar-content-wrapper">
            <!-- Column 1: Main Community -->
            <div class="sidebar-column" id="col-main">
                <div class="column-info">
                    <div class="country-zoom">
                        <select id="country-select">
                            <option value="All">All Communities</option>
                            <option value="Nepal">Nepal Only</option>
                            <option value="Bangladesh">Bangladesh Only</option>
                        </select>
                    </div>
                    <h2 id="community-name">Community Name</h2>
                </div>

                <div class="tabs">
                    <button class="tab-btn active" data-tab="score" data-col="main">Resilience</button>
                    <button class="tab-btn" data-tab="demographics" data-col="main">Demographics</button>
                    <button class="tab-btn" data-tab="activities" data-col="main">Activities</button>
                </div>

                <div class="tab-content" id="tab-score-main">
                    <div class="resilience-scroll-area">
                        <div id="gauge-group-main" class="hidden">
                            <div class="gauge-container">
                                <canvas id="gauge-canvas-main"></canvas>
                                <div class="gauge-labels">
                                    <span>T0 (Lower)</span>
                                    <span>T1 (Current)</span>
                                </div>
                            </div>
                        </div>
                        <div id="capitals-container-main" class="capitals-list"></div>
                    </div>
                    <div class="fixed-controls">
                        <div class="expansion-controls">
                            <button id="accordion-toggle-main" class="toggle-btn-small active">Accordion: ON</button>
                        </div>
                        <button id="open-compare-btn" class="compare-btn-main">Compare (just for viewing)</button>
                    </div>
                </div>

                <div class="tab-content hidden" id="tab-demographics-main">
                    <div id="demographics-text-main" class="info-card"></div>
                </div>

                <div class="tab-content hidden" id="tab-activities-main">
                    <ul id="activities-list-main" class="activity-items"></ul>
                </div>
            </div>

            <!-- Column 2: Comparison Community -->
            <div class="sidebar-column hidden" id="col-compare">
                <div class="column-info">
                    <div class="compare-select-container">
                        <select id="compare-community-select-v2">
                            <option value="" disabled selected>Select Community to Compare...</option>
                        </select>
                    </div>
                    <h2 id="compare-community-name">Compare</h2>
                </div>

                <div class="tabs">
                    <button class="tab-btn active" data-tab="score" data-col="compare">Resilience</button>
                    <button class="tab-btn" data-tab="demographics" data-col="compare">Demographics</button>
                    <button class="tab-btn" data-tab="activities" data-col="compare">Activities</button>
                </div>

                <div class="tab-content" id="tab-score-compare">
                    <div class="resilience-scroll-area">
                        <div id="gauge-group-compare" class="hidden">
                            <div class="gauge-container">
                                <canvas id="gauge-canvas-compare"></canvas>
                                <div class="gauge-labels">
                                    <span>T0 (Lower)</span>
                                    <span>T1 (Current)</span>
                                </div>
                            </div>
                        </div>
                        <div id="capitals-container-compare" class="capitals-list"></div>
                    </div>
                    <div class="fixed-controls">
                        <div class="expansion-controls">
                            <button id="accordion-toggle-compare" class="toggle-btn-small active">Accordion: ON</button>
                        </div>
                    </div>
                </div>

                <div class="tab-content hidden" id="tab-demographics-compare">
                    <div id="demographics-text-compare" class="info-card"></div>
                </div>

                <div class="tab-content hidden" id="tab-activities-compare">
                    <ul id="activities-list-compare" class="activity-items"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Admin Login</h3>
            <div class="form-group">
                <label for="admin-password">Password</label>
                <input type="password" id="admin-password" placeholder="Enter password...">
                <p id="login-error" class="error-text hidden">Incorrect password.</p>
            </div>
            <div class="modal-actions">
                <button id="login-submit" class="toggle-btn primary">Login</button>
                <button id="login-cancel" class="toggle-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Add Community Modal -->
    <div id="add-community-modal" class="modal hidden">
        <div class="modal-content large">
            <h3>Add New Community</h3>
            <div class="form-tabs">
                <button class="form-tab-btn active" data-form-tab="basics">1. Basics</button>
                <button class="form-tab-btn" data-form-tab="demo">2. Demographics</button>
                <button class="form-tab-btn" data-form-tab="resilience">3. Resilience</button>
                <button class="form-tab-btn" data-form-tab="grading">4. Grading</button>
            </div>

            <form id="add-community-form">
                <div class="form-section" id="form-basics">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="new-comm-name" placeholder="e.g., Kathmandu" required>
                        </div>
                        <div class="form-group">
                            <label>Country</label>
                            <select id="new-comm-country" required>
                                <option value="Nepal">Nepal</option>
                                <option value="Bangladesh">Bangladesh</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Coordinates (Lat, Lng)</label>
                            <input type="text" id="new-comm-coords" readonly>
                        </div>
                    </div>
                </div>

                <div class="form-section hidden" id="form-demo">
                    <div class="form-grid">
                        <div class="form-group"><label>Total Population</label><input type="number" id="new-demo-total"
                                value="0"></div>
                        <div class="form-group"><label>Male</label><input type="number" id="new-demo-male" value="0">
                        </div>
                        <div class="form-group"><label>Female</label><input type="number" id="new-demo-female"
                                value="0"></div>
                        <div class="form-group"><label>Children</label><input type="number" id="new-demo-children"
                                value="0"></div>
                        <div class="form-group"><label>Elderly</label><input type="number" id="new-demo-elderly"
                                value="0"></div>
                        <div class="form-group"><label>Disabilities</label><input type="number"
                                id="new-demo-disabilities" value="0"></div>
                    </div>
                    <div class="form-group" style="margin-top: 10px;">
                        <label>Description (Main Livelihood, etc.)</label>
                        <input type="text" id="new-demo-desc" placeholder="e.g., Agriculture | High Vulnerability">
                    </div>
                </div>

                <div class="form-section hidden" id="form-resilience">
                    <div class="form-grid">
                        <div class="form-group"><label>Baseline Score (T0)</label><input type="number" id="new-score-t0"
                                value="0" min="0" max="100"></div>
                        <div class="form-group"><label>Current Score (T1)</label><input type="number" id="new-score-t1"
                                value="0" min="0" max="100"></div>
                    </div>
                </div>

                <div class="form-section hidden" id="form-grading">
                    <div id="gradings-grid" class="form-grid-three">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </form>

            <div class="modal-actions">
                <button type="button" id="add-comm-submit" class="toggle-btn primary">Save Community</button>
                <button type="button" id="add-comm-cancel" class="toggle-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data.js"></script>
    <script src="communities.js"></script>
    <script src="activities.js"></script>
    <script src="app.js"></script>
</body>

</html>

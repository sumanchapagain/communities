<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Resilience Network</title>
    <link rel="stylesheet" href="style_v2.css">
</head>
<body>

    <!-- App Header / Menu Bar -->
    <header class="app-header">
        <div class="brand">
            <img class="logo" src="logo.png" alt="ZCRAlliance Logo" style="height: 40px; width: auto; object-fit: contain;">
            <div class="brand-text">
                <h1>Resilience Measurement</h1>
                <span>Network Analysis Dashboard</span>
            </div>
        </div>
        
        <nav class="main-nav">
            <div class="view-switcher" id="home-view-switcher">
                <button class="view-btn active" id="btn-diagram" onclick="switchView('diagram')">⬡ Diagram View</button>
                <button class="view-btn" id="btn-table" onclick="switchView('table')">⊞ Table View</button>
            </div>
            <!-- Theme Toggle -->
            <label class="theme-toggle" title="Toggle Light / Dark mode">
                <input type="checkbox" id="theme-checkbox" onchange="toggleTheme(this.checked)">
                <span class="theme-track">
                    <span class="theme-thumb"></span>
                </span>
                <span class="theme-label" id="theme-label">☀️</span>
            </label>
        </nav>

        <!-- Center Menu Bar (Hidden) -->
        <div class="center-menu">
            <button class="menu-btn active" onclick="handleMenuClick(this, 'Home')">Home</button>
            <button class="menu-btn" onclick="handleMenuClick(this, 'Activities')">Activities</button>
            <button class="menu-btn" onclick="handleMenuClick(this, 'Knowledge')">Knowledge</button>
            <button class="menu-btn" onclick="handleMenuClick(this, 'Scores')">Scores</button>
        </div>
    </header>

    <main class="app-content">
        <!-- Home Screen -->
        <section id="home-screen" class="app-screen active">
            <div class="dashboard" id="diagram-view">
                <div class="sidebar left" id="sidebar-left"></div>
                
                <div class="center-stage">
                    <div class="indicator-ring" id="indicator-ring">
                        <div class="grade-center">
                            <div id="hover-label-display"></div>
                            <div class="grade-cards" id="grade-cards-default">
                                <div class="grade-box" id="grade-A" onclick="selectItem('grade', 'A')">A<span>Grade</span></div>
                                <div class="grade-box" id="grade-B" onclick="selectItem('grade', 'B')">B<span>Grade</span></div>
                                
                                <div class="title-container">
                                    <div class="center-heading">CRMC Result</div>
                                    <div class="filters">
                                        <label><input type="checkbox" id="chk-generic" value="Generic" checked onchange="renderIndicators()"> Generic</label>
                                        <label><input type="checkbox" id="chk-flood" value="Flood" checked onchange="renderIndicators()"> Flood</label>
                                        <label><input type="checkbox" id="chk-heat" value="Heatwave" checked onchange="renderIndicators()"> Heatwave</label>
                                    </div>
                                </div>
                                
                                <div class="grade-box" id="grade-C" onclick="selectItem('grade', 'C')">C<span>Grade</span></div>
                                <div class="grade-box" id="grade-D" onclick="selectItem('grade', 'D')">D<span>Grade</span></div>
                            </div>

                            <!-- Community detail view (replaces grade cards when a community is selected) -->
                            <div id="comm-detail-inner" class="comm-detail-inner hidden">
                                <div class="comm-detail-top">
                                    <div class="comm-detail-gauge" id="comm-detail-gauge"></div>
                                    <div class="comm-detail-demo" id="comm-detail-demo"></div>
                                </div>
                                <div class="comm-detail-bottom">
                                    <div class="comm-grade-row" id="comm-grade-row"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="sidebar right" id="sidebar-right"></div>
            </div>

            <!-- Table View -->
            <div id="table-view" style="display:none;">
                <div class="table-toolbar">
                    <label><input type="checkbox" id="tbl-generic" value="Generic" checked onchange="renderTable()"> Generic</label>
                    <label><input type="checkbox" id="tbl-flood" value="Flood" checked onchange="renderTable()"> Flood</label>
                    <label><input type="checkbox" id="tbl-heat" value="Heatwave" checked onchange="renderTable()"> Heatwave</label>
                    <div class="toolbar-divider"></div>
                    <div id="tbl-hover-label">
                        <span id="tbl-hover-code"></span>
                        <span id="tbl-hover-text">Hover over an indicator column to see its label</span>
                    </div>
                </div>
                <div class="table-scroll-wrapper">
                    <table id="data-table"><thead></thead><tbody></tbody></table>
                </div>
            </div>
            <svg id="lines"><g id="lines-group"></g></svg>
        </section>

        <!-- Activities Screen -->
        <section id="activities-screen" class="app-screen">
            <div class="screen-toolbar">
                <div class="search-box">
                    <span>🔍</span><input type="text" id="act-search" placeholder="Search indicators or codes..." autocomplete="off">
                </div>
                <div class="filter-chips" id="act-hazard-filters">
                    <button class="chip active" data-hazard="All">All Hazards</button>
                    <button class="chip" data-hazard="Flood">Flood</button>
                    <button class="chip" data-hazard="Heat">Heat</button>
                    <button class="chip" data-hazard="Multi">Multi</button>
                    <button class="chip" data-hazard="Others">Others</button>
                </div>
                <div class="filter-chips" id="act-capital-filters">
                    <button class="chip active" data-capital="All">All Capitals</button>
                    <button class="chip" data-capital="Financial">Financial</button>
                    <button class="chip" data-capital="Human">Human</button>
                    <button class="chip" data-capital="Natural">Natural</button>
                    <button class="chip" data-capital="Physical">Physical</button>
                    <button class="chip" data-capital="Social">Social</button>
                </div>
            </div>
            <div class="activities-grid" id="activities-grid">
                <!-- Cards will be rendered here via JS -->
            </div>
            <div id="act-no-results" class="no-results hidden">
                <div class="no-results-icon">∅</div>
                <p>No matching activities found</p>
            </div>
        </section>

        <!-- Knowledge Screen -->
        <section id="knowledge-screen" class="app-screen">
                       <div class="screen-toolbar">
                <div class="search-box">
                    <span>🔍</span><input type="text" id="know-search" placeholder="Search by title, hazard, or capital..." autocomplete="off">
                </div>
            </div>
            <div class="knowledge-grid" id="knowledge-grid">
                <!-- Resources rendered via JS -->
            </div>
            <div id="know-no-results" class="no-results hidden">
                <div class="no-results-icon">∅</div>
                <p>No matching knowledge products found</p>
            </div>
        </section>

        <!-- Scores Screen -->
        <section id="scores-screen" class="app-screen">
            <div class="screen-toolbar">
                <div class="search-box">
                    <span>🔍</span><input type="text" id="score-search" placeholder="Search communities..." autocomplete="off">
                </div>
                <div class="filter-chips" id="score-hazard-filters">
                    <button class="chip" data-tab="Flood">Flood</button>
                    <button class="chip" data-tab="Heat">Heat</button>
                    <button class="chip active" data-tab="Both">Both</button>
                </div>
            </div>
            <div class="scores-grid" id="scores-grid">
                <!-- Community cards will be rendered here via JS -->
            </div>
            <div id="score-no-results" class="no-results hidden">
                <div class="no-results-icon">∅</div>
                <p>No matching communities found</p>
            </div>
        </section>
    </main>
    
    
    <!-- Interaction HUD -->
    <div id="interaction-hud">
        <div id="hud-nav" style="display: none; align-items: center; gap: 20px;">
            <button id="hud-prev" class="nav-arrow">◀</button>
            <button id="hud-next" class="nav-arrow" title="Hold for 2s to Auto-run">▶</button>
        </div>
        <span id="hud-text" style="display: flex;"></span>
    </div>

    <!-- Activity Modal -->
    <div class="modal-overlay" id="activity-modal" onclick="closeActivityModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeActivityModal()">×</button>
            <div class="modal-body" id="activity-modal-body">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <!-- Knowledge Product Modal -->
    <div class="modal-overlay" id="knowledge-modal" onclick="closeKnowledgeModal(event)">
        <div class="modal-content" style="max-width:680px;" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeKnowledgeModal()">×</button>
            <div class="modal-body" id="knowledge-modal-body">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <!-- Score Detail Modal -->
    <div class="modal-overlay" id="score-detail-modal" onclick="closeScoreDetailModal(event)">
        <div class="modal-content" style="max-width:700px;max-height:85vh;overflow-y:auto;" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeScoreDetailModal()">×</button>
            <div class="modal-body" id="score-detail-modal-body">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <script src="metadata.js"></script>
    <script src="script_v2.js"></script>
</body>

</html>
